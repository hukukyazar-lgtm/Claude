name: Build Android App Bundle

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Git LFS and fetch objects
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install --system
          git lfs pull
          # Check if the wrapper is an LFS pointer and pull it if so
          if grep -q "version https://git-lfs.github.com/spec/v1" android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null; then
            echo "LFS pointer detected for gradle-wrapper.jar, attempting pull..."
            git lfs pull --include="android/gradle/wrapper/gradle-wrapper.jar"
          fi

      - name: Verify PNG files
        run: |
          echo "Checking PNG files..."
          for f in android/app/src/main/res/mipmap-*/ic_launcher*.png; do
            echo "$f: $(file -b --mime-type $f) ($(wc -c < $f) bytes)"
          done

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          add-job-summary-as-pr-comment: always
          validate-wrappers: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          TARGET="android/app/lumina.keystore"
          
          if [ -f "$TARGET" ]; then
            echo "Keystore detected in repository: $TARGET"
            # Check if it's an LFS pointer
            if grep -q "version https://git-lfs.github.com/spec/v1" "$TARGET"; then
              echo "WARNING: Keystore is an LFS pointer. Attempting to pull full file..."
              git lfs pull --include="$TARGET"
            fi
          elif [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Decoding KEYSTORE_BASE64 secret..."
            # Strip potential whitespace and decode
            echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > "$TARGET"
            echo "Keystore decoded from secret."
          else
            echo "CRITICAL ERROR: No keystore found!"
            echo "Please upload 'lumina.keystore' to 'android/app/' folder in the AI Studio editor."
            exit 1
          fi

          # VALIDATION: Check file size and integrity
          SIZE=$(stat -c%s "$TARGET")
          echo "File size: $SIZE bytes"
          if [ "$SIZE" -lt 500 ]; then
            echo "ERROR: Keystore file is too small ($SIZE bytes). It is likely corrupted or an LFS pointer that failed to pull."
            echo "Content of file (first 50 bytes):"
            head -c 50 "$TARGET" | hexdump -C || true
            exit 1
          fi

          # INTEGRITY: Try to list aliases to verify password and format
          echo "Verifying keystore integrity with keytool..."
          if ! keytool -list -v -keystore "$TARGET" -storepass "${{ secrets.KEYSTORE_PASSWORD || 'Asena1numara!' }}" > /dev/null 2>&1; then
            echo "ERROR: Keystore file is invalid or password incorrect."
            echo "If you uploaded the file from your phone, it might be corrupted."
            exit 1
          fi
          echo "Keystore validation PASSED."

      - name: Re-encode and validate Android PNGs
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick file pngcrush optipng pngcheck zopfli
          set -euo pipefail

          # Use magick if available (ImageMagick v7), else fall back to convert
          if command -v magick >/dev/null 2>&1; then
            IM_CONVERT="magick"
          else
            IM_CONVERT="convert"
          fi

          # Function to create a 1x1 transparent PNG if repair fails
          create_dummy_png() {
            local target="$1"
            echo "Creating dummy PNG for $target"
            # Create a 48x48 transparent PNG using ImageMagick
            $IM_CONVERT -size 48x48 xc:none "$target"
          }

          bad=0
          echo "Scanning PNGs under android/app/src/main/res..."
          while IFS= read -r -d '' f; do
            echo "----"
            echo "Checking: $f"
            
            # Check if it's a valid PNG
            if ! pngcheck -v "$f" >/dev/null 2>&1; then
              echo "INVALID PNG DETECTED (likely LFS pointer or corrupted): $f"
              
              # Try to repair/re-encode
              if $IM_CONVERT "$f" -strip -define png:format=png32 "$f".tmp 2>/dev/null; then
                mv "$f".tmp "$f"
                echo "Successfully re-encoded $f"
              else
                echo "Repair failed, creating dummy asset to allow build to proceed"
                create_dummy_png "$f"
              fi
            fi

            # Double check with pngcheck
            if ! pngcheck -v "$f" >/dev/null 2>&1; then
              echo "CRITICAL: Even dummy creation failed for $f"
              bad=1
            else
              echo "OK: $f"
            fi
          done < <(find android/app/src/main/res -type f -name '*.png' -print0)

          if [ "$bad" -ne 0 ]; then
            echo "Failed to prepare valid assets."
            exit 1
          fi
        shell: bash

      - name: Build with Gradle
        run: |
          cd android
          # Explicitly set storeFile path relative to android/app/
          gradle bundleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.java.home=$JAVA_HOME \
            -PRELEASE_STORE_FILE=lumina.keystore \
            -PRELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
