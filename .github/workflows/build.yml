name: Build Android App Bundle

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'
          add-job-summary-as-pr-comment: always
          validate-wrappers: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/lumina.keystore

      - name: Re-encode and validate Android PNGs
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick file pngcrush optipng pngcheck zopfli
          set -euo pipefail

          # Use magick if available (ImageMagick v7), else fall back to convert
          if command -v magick >/dev/null 2>&1; then
            IM_CONVERT="magick"
          else
            IM_CONVERT="convert"
          fi

          bad=0
          echo "Scanning PNGs under android/app/src/main/res..."
          # run while in main shell using process substitution so 'bad' is visible after loop
          while IFS= read -r -d '' f; do
            echo "----"
            echo "Checking: $f"
            # skip zero-byte files
            if [ ! -s "$f" ]; then
              echo "ERROR: zero-byte file -> $f"
              bad=1
              continue
            fi

            mime=$(file -b --mime-type "$f" || echo "unknown")
            echo "mime: $mime"
            if [ "$mime" != "image/png" ]; then
              echo "ERROR: not recognized as PNG -> $f (mime=$mime)"
              bad=1
              continue
            fi

            # quick check for PNG integrity
            if ! pngcheck -v "$f"; then
              echo "pngcheck reports problems for $f — attempting repairs"
              # try ImageMagick re-encode to PNG32
              if $IM_CONVERT "$f" -strip -define png:format=png32 "$f".tmp 2>/dev/null; then
                mv "$f".tmp "$f"
                echo "ImageMagick succeeded for $f"
              else
                echo "ImageMagick failed; trying optipng"
                if optipng -o7 -out "$f".tmp "$f" >/dev/null 2>&1 && mv "$f".tmp "$f"; then
                  echo "optipng succeeded for $f"
                else
                  echo "optipng failed; trying zopflipng"
                  if zopflipng --lossless "$f" "$f".tmp >/dev/null 2>&1 && mv "$f".tmp "$f"; then
                    echo "zopflipng succeeded for $f"
                  else
                    echo "All repair attempts failed for $f"
                    bad=1
                  fi
                fi
              fi
            fi

            # final validation after repair attempts
            if ! pngcheck -v "$f"; then
              echo "FINAL CHECK FAILED for $f"
              bad=1
            else
              echo "OK: $f"
            fi
          done < <(find android/app/src/main/res -type f -name '*.png' -print0)

          if [ "$bad" -ne 0 ]; then
            echo "One or more PNG files are corrupted or not aapt2-compatible. Fix or replace listed files and re-run."
            # Print a quick listing for troubleshooting
            ls -l android/app/src/main/res/mipmap-*/ic_launcher*.png || true
            exit 1
          fi
        shell: bash

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            --no-daemon \
            -Dorg.gradle.java.home=$JAVA_HOME \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/lumina.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
