name: Build Android App Bundle

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
          add-job-summary-as-pr-comment: always
          validate-wrappers: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Decode Keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Re-encode Android PNGs
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick file pngcrush
          set -e
          # Process PNG files safely: skip zero-byte and non-PNG files,
          # try convert first, fallback to pngcrush, never abort entire job for a single file.
          find android/app/src/main/res -type f -name '*.png' -print0 | while IFS= read -r -d '' f; do
            echo "Checking $f"
            # skip zero-byte files
            if [ ! -s "$f" ]; then
              echo "Skipping zero-byte file: $f"
              continue
            fi
            # ensure file content is actually PNG
            mime=$(file -b --mime-type "$f" || echo "unknown")
            if [ "$mime" != "image/png" ]; then
              echo "Skipping non-PNG file: $f (mime=$mime)"
              continue
            fi
            echo "Re-encoding $f"
            # try ImageMagick; if it fails try pngcrush; on failure skip file but continue job
            if convert "$f" -strip -define png:format=png32 "$f".tmp 2>/dev/null; then
              mv "$f".tmp "$f"
              echo "convert succeeded for $f"
            else
              echo "convert failed for $f — attempting pngcrush"
              if pngcrush -q -reduce -brute "$f" "$f".tmp >/dev/null 2>&1 && mv "$f".tmp "$f"; then
                echo "pngcrush succeeded for $f"
              else
                echo "Both convert and pngcrush failed for $f — skipping"
                rm -f "$f".tmp || true
                continue
              fi
            fi
          done

      - name: Build with Gradle
        run: |
          cd android
          gradle bundleRelease --stacktrace
        env:
          RELEASE_STORE_FILE: release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
