
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>EVA.IST Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-main: 'Montserrat', sans-serif;
      --color-cyan: #22d3ee;
      --color-indigo: #818cf8;
      --color-pink: #c084fc;
      --color-amber: #0e7490;
      --color-green: #0b0e14;
      --color-coral: #f87171;
    }
    
    * {
      font-family: var(--font-main) !important;
      font-style: normal !important;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #020617;
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
      touch-action: none;
      user-select: none;
      position: fixed;
      color: #f8fafc;
    }

    /* Typography Hierarchy */
    h1, h2, h3 { font-weight: 800; letter-spacing: -0.02em; }
    p, span, div { font-weight: 500; }
    button { font-weight: 700; letter-spacing: 0.02em; }

    /* Nebula Background Effect */
    .nebula {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.4;
      filter: blur(80px);
      background: 
        radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
    }

    /* Yıldız Katmanları */
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .star-layer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .star-layer-1 {
      background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat top center;
      z-index: 0;
      opacity: 0.5;
      animation: move-stars 200s linear infinite;
    }

    .star-layer-2 {
      background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/twinkling.png') repeat top center;
      z-index: 1;
      opacity: 0.3;
      animation: move-twinkling 150s linear infinite;
    }

    .star-layer-3 {
      background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/clouds.png') repeat top center;
      z-index: 2;
      opacity: 0.1;
      animation: move-clouds 300s linear infinite;
    }

    @keyframes move-stars {
      from { background-position: 0 0; }
      to { background-position: -10000px 5000px; }
    }

    @keyframes move-twinkling {
      from { background-position: 0 0; }
      to { background-position: -10000px 5000px; }
    }

    @keyframes move-clouds {
      from { background-position: 0 0; }
      to { background-position: 10000px 0; }
    }

    #root {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* GPU Hızlandırmalı Global Animasyonlar */
    @keyframes cube-rotate-x {
      from { transform: rotateX(0deg); }
      to { transform: rotateX(360deg); }
    }
    @keyframes cube-rotate-y {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
    @keyframes cube-rotate-xy {
      from { transform: rotateX(0deg) rotateY(0deg); }
      to { transform: rotateX(360deg) rotateY(720deg); }
    }
    @keyframes cube-rotate-tumble {
      from { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      to { transform: rotateX(360deg) rotateY(720deg) rotateZ(360deg); }
    }
    @keyframes cube-drift {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(3px, -5px, 12px); }
    }
    @keyframes plasma-pulse {
      0%, 100% { opacity: 0.15; transform: scale(0.9); }
      50% { opacity: 0.35; transform: scale(1.1); }
    }
    @keyframes plasma-flow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes planet-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-planet-rotate { 
      animation: planet-rotate 240s linear infinite; 
    }

    .planet-tilt {
      transform: rotate(23.5deg);
    }

    .animate-cube-x { animation: cube-rotate-x var(--cube-speed, 4s) linear infinite; }
    .animate-cube-y { animation: cube-rotate-y var(--cube-speed, 4s) linear infinite; }
    .animate-cube-xy { animation: cube-rotate-xy var(--cube-speed, 4s) linear infinite; }
    .animate-cube-tumble { animation: cube-rotate-tumble var(--cube-speed, 4s) linear infinite; }
    .animate-cube-drift { animation: cube-drift 15s infinite ease-in-out; }
    .animate-plasma-flow { animation: plasma-flow 2s infinite linear; }

    .glass-morphism {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03));
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    .glass-morphism-bright {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.08));
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .btn-spline {
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .no-scroll {
      overflow: hidden !important;
      touch-action: none;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 0px;
      display: none;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(35deg); }
      100% { transform: translateX(200%) rotate(35deg); }
    }
  </style>
